name: Live Portfolio Tracker Engine

on:
  schedule:
    - cron: '45 20 * * 1-5'
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v3

    - name: Setup Python Runtime Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy yfinance

    - name: Run Tracker Cycle Execution
      run: python src/local_live_tracker.py

    - name: Commit Updated Ledger Values back to Main Repo
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/live_portfolio.json data/live_execution_log.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated System Rebalance Ledger: $(date)" && git push)
